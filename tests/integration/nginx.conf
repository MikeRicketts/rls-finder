# Gateway that mirrors Supabase's layout on a single origin:
#   /                -> a static page that ships the anon key (like a real app)
#   /rest/v1/<table> -> proxied to PostgREST (Supabase serves PostgREST here)
#
# This lets RLScout run completely unmodified: recon finds the key on the page,
# infers the API base as this origin, and hits /rest/v1/ exactly as on Supabase.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;

    location = / {
        try_files /index.html =404;
    }

    location /rest/v1/ {
        # Trailing slash strips the /rest/v1/ prefix before forwarding, so
        # /rest/v1/public_notes -> postgrest:3000/public_notes and
        # /rest/v1/            -> postgrest:3000/ (the OpenAPI spec).
        proxy_pass http://postgrest:3000/;
        proxy_set_header Host $host;
    }
}
